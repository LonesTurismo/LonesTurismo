<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lançar Lista</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    content: ["./frontend/**/*.{html,js}"],
    theme: { extend: { colors: { primary: "#0ea5e9" } } }
  }
</script>
</head>
<body>
<header class="topbar">
 <a href="index." class="logo-link">
  <img src="img/logo-lones.png" alt="Lones Turismo">
</a>
  <nav class="menu">
    <a class="active" href="cadastro">Lançar Lista</a>
    <a href="editar">Editar Lista</a>
    <a href="admin">Admin</a>
  </nav>
  
</header>


<main class="page">
  <div class="container wide">
    <div class="card">
      <h2 style="margin:0 0 8px 0;">Adicione os dados para enviar a lista de viagem.</h2>
      <div class="grid-3">
        <div>
          <label>Destino</label>
          <input id="destination" placeholder="Ex.: Goiânia"/>
        </div>
        <div>
          <label>Data</label>
          <input id="dateIso" type="date"/>
        </div>
        <div>
          <label>Guia/Vendedora/Responsável</label>
          <input id="responsible" placeholder="Ex.: Ana"/>
        </div>
      </div>

      <div class="row">
        <button class="btn primary" id="btnCreateTrip">Criar Viagem</button>
        <button class="btn" id="btnCopyTrip" type="button">Copiar ID + PIN</button>
      </div>

      <div class="hint" id="tripInfo"></div>
    </div>

    <div class="card">
      <h2 style="margin:0 0 8px 0;">Adicionar Passageiro</h2>
      <div class="grid-4">
        <div>
          <label>Nome</label>
          <input id="pName" maxlength="100"/>
        </div>
        <div>
          <label>CPF</label>
          <input id="pCpf" maxlength="14" placeholder="000.000.000-00"/>
        </div>
        <div>
          <label>Telefone</label>
          <input id="pPhone" maxlength="11" placeholder="(xx) xxxxx-xxxx"/>
        </div>
        <div>
          <label>Docs (até 4)</label>
          <input id="pDocs" type="file" multiple accept=".jpg,.jpeg,.png"/>
        </div>
      </div>

      <div class="row">
        <button class="btn primary" id="btnAddPassenger">Adicionar</button>
        <a class="btn" href="editar">Ir para edição</a>
      </div>

      <div class="hint">Para alterar a lista posteriormente salve o ID + PIN gerado ao criar a viagem.</div>
    </div>
  </div>
</main>

<script src="js/app.js"></script>
</body>
</html>
