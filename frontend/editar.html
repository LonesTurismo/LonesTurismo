<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dados do Passageiro</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="logo">
    <img src="img/logo-lones.png">
  </div>
  <nav>
    <a href="LonesTur.html">Início</a>
    <a href="destino.html">Solicitar Viagem</a>
  </nav>
</header>

<div class="container-grupo">
<h2>Dados do Passageiro</h2>

<div class="tabs">
  <button onclick="mostrarIndividual()">Um Passageiro</button>
  <button onclick="mostrarTurma()">Turma (Grupo)</button>
</div>

<!-- INDIVIDUAL -->
<div id="individual">
  <input type="text" id="nome" maxlength="100" placeholder="Nome completo">
  <input type="text" id="cpf" maxlength="10" placeholder="CPF (10 dígitos)">
  <input type="text" placeholder="Telefone" maxlength="11" placeholder="Número de contato">
  <input type="file" id="docs" multiple accept=".jpg,.jpeg,.png">
  <button onclick="enviarIndividual()">Enviar</button>
</div>

<!-- TURMA -->
<div id="turma" style="display:none;">
  <div id="listaPassageiros"></div>
  <button onclick="adicionarPassageiro()">+ Adicionar Passageiro</button>
  <button onclick="enviarTurma()">Enviar Turma</button>
</div>

</div>

<script src="js/script.js"></script>
</body>
</html>
