<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel Admin • Lones Turismo</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      content: ["./frontend/**/*.{html,js}"],
      theme: { extend: { colors: { primary: "#0ea5e9" } } }
    }
  </script>
  <style>
    .admin-wrap{ width:min(1120px, 92%); margin: 22px auto; }
    .muted{ opacity:.75; }

    .tabs{ display:flex; gap:10px; flex-wrap:wrap; margin:14px 0 14px; }
    .tab{
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color: inherit;
      padding:10px 12px;
      border-radius: 14px;
      cursor:pointer;
      font-weight:800;
    }
    .tab.active{ background: rgba(255,255,255,.12); }

    .panel{
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.05);
      border-radius: 18px;
      padding:16px;
    }
    .panel-top{
      display:flex; justify-content:space-between; gap:14px; align-items:flex-start;
      flex-wrap:wrap; margin-bottom: 12px;
    }
    .panel-actions{ display:flex; gap:10px; flex-wrap:wrap; }

    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      padding:12px 16px; border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color: #eaf0ff; text-decoration:none;
      font-weight:800; cursor:pointer;
    }
    .btn.primary{ background: linear-gradient(135deg, rgba(0,160,255,.95), rgba(0,255,180,.85)); border:none; color:#07101f; }
    .btn.danger{ background: rgba(255,70,70,.15); border-color: rgba(255,70,70,.35); }

    .table-wrap{ overflow:auto; border-radius: 14px; }
    table{ width:100%; border-collapse: collapse; min-width: 680px; }
    th, td{ padding:12px 12px; border-bottom: 1px solid rgba(255,255,255,.10); text-align:left; }
    thead th{ position:sticky; top:0; background: rgba(11,18,32,.9); }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <a href="/" class="logo-link">
        <img src="img/logo-lones.png" alt="Lones Turismo">
      </a>
    </div>
    <nav class="menu">
      <a href="/cadastro">Lista</a>
      <a href="/admin">Admin</a>
    </nav>
  </header>

  <section class="admin-wrap">
    <h2>Painel do Administrador</h2>
    <p class="muted">Selecione uma viagem e visualize os passageiros cadastrados.</p>

    <div id="tabs" class="tabs"></div>

    <div class="panel">
      <div class="panel-top">
        <div>
          <h3 id="viagemTitulo">Selecione uma viagem</h3>
          <p id="viagemInfo" class="muted"></p>
        </div>

        <div class="panel-actions">
          <button id="btnEditar" class="btn" disabled>Editar lista</button>
          <button id="btnZip" class="btn primary" disabled>Exportar ZIP</button>
          <button id="btnExcel" class="btn" disabled>Exportar Excel</button>
          <button id="btnDocx" class="btn" disabled>Exportar Documento</button>
          <button id="btnApagar" class="btn danger" disabled>Apagar após baixar</button>
          <button id="btnLogout" class="btn">Sair</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>CPF</th>
              <th>Telefone</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="3" class="muted">Nenhuma viagem selecionada.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>

  <script src="js/app.js"></script>
</body>
</html>
